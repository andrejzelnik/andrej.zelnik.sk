name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Using pull_request (not pull_request_target) intentionally — pull_request_target
  # runs with write permissions in the context of the base branch, which would allow
  # a malicious PR to exfiltrate secrets or push arbitrary code to gh-pages.
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  validate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: pip install html5validator==0.4.2
      - run: html5validator --root . --also-check-css

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,CLAUDE.md,README.md,.gitignore'

  preview:
    needs: validate
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (needs.validate.result == 'success' || github.event.action == 'closed')
    concurrency:
      group: preview-${{ github.event.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: .
          preview-branch: gh-pages
