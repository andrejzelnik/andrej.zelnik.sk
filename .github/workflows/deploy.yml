name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Using pull_request (not pull_request_target) intentionally — pull_request_target
  # runs with write permissions in the context of the base branch, which would allow
  # a malicious PR to exfiltrate secrets or push arbitrary code to gh-pages.
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  validate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: pip install html5validator==0.4.2
      - run: html5validator --root . --also-check-css

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,CLAUDE.md,README.md,.gitignore'

  preview:
    needs: validate
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (needs.validate.result == 'success' || github.event.action == 'closed')
    concurrency:
      group: preview-${{ github.event.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rossjrw/pr-preview-action@430e3dfc1de8a8ae77e77d862d25676ef9db55d1 # v1.4.8
        with:
          source-dir: .
          preview-branch: gh-pages
